server {
    listen 80;
    listen [::]:80;
    server_name coolhost.test www.coolhost.test;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name coolhost.test www.coolhost.test;
    root /sandbox;
    index index.html index.htm index.php;

    ssl_certificate C:/Users/atobo/My Drive (craig.follows@gmail.com)/AI Stuff/cpanel/server/ssl/coolhost.test/fullchain.pem;
    ssl_certificate_key C:/Users/atobo/My Drive (craig.follows@gmail.com)/AI Stuff/cpanel/server/ssl/coolhost.test/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    access_log /var/log/nginx/coolhost.test-access.log;
    error_log /var/log/nginx/coolhost.test-error.log error;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
